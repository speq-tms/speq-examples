id: "comments.create.gen-data"
title: "Comments: create comment with generated data (Feature 1)"
tags: [api, comments, data-generation]
variables:
  generatedEmail:
    gen: { type: email }
steps:
  - type: api
    name: "POST /comments with gen body"
    method: POST
    url: "/comments"
    body:
      postId:
        gen: { type: int, min: 1, max: 100 }
      name:
        gen: { type: string, minLength: 5, maxLength: 30 }
      email: "{{generatedEmail}}"
      body:
        gen: { type: string, minLength: 10, maxLength: 100 }
    assert:
      - type: status
        expected: 201
      - type: schema
        ref: "jsonplaceholder/comment.schema.json"
